<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LMVBVA - Joueurs</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      padding: 40px 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .topbar img { max-width: 60px; border-radius: 4px; }
    .back-link { color: #f5c400; text-decoration: none; font-size: 14px; }
    h1 {
      text-align: center;
      color: #f5c400;
      letter-spacing: 2px;
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .new-player {
      max-width: 700px;
      margin: 0 auto 20px auto;
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .new-player div { flex: 1; min-width: 140px; }
    .new-player label { font-size: 13px; color: #bbbbbb; display: block; margin-bottom: 4px; }
    .new-player input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ffffff;
      border-radius: 4px;
    }
    .new-player button {
      background: #f5c400;
      color: #111;
      font-weight: bold;
      border: none;
      padding: 11px 18px;
      border-radius: 4px;
      cursor: pointer;
    }
    .player-list { max-width: 700px; margin: 0 auto; }
    .player-row {
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    #error { color: #ff6666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="logo.jpg" alt="LMVBVA">
    <a href="teams.html" class="back-link">&larr; RETOUR AUX ÉQUIPES</a>
  </div>
  <h1>GESTION DES JOUEURS</h1>

  <div class="new-player">
    <div>
      <label for="firstName">Prénom</label>
      <input type="text" id="firstName">
    </div>
    <div>
      <label for="lastName">Nom</label>
      <input type="text" id="lastName">
    </div>
    <button id="addBtn">AJOUTER</button>
  </div>

  <div class="player-list" id="playerList"></div>
  <div id="error"></div>

  <script src="manage-players.js"></script>
</body>
</html>
