<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMVBVA - Connexion</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .card img {
      display: block;
      max-width: 160px;
      margin: 0 auto 20px auto;
      border-radius: 6px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #bbbbbb;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ffffff;
      border-radius: 4px;
    }
    input:focus {
      outline: none;
      border-color: #f5c400;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 24px;
      background: #f5c400;
      color: #111111;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    button:hover { background: #e0b400; }
    #error {
      color: #ff6666;
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 600px) {
      body {
        background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header-mobile.png');
        align-items: flex-end;
        padding-bottom: 40px;
      }
      .card {
        max-width: 85%;
        padding: 24px;
      }
      .card img {
        max-width: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.jpg" alt="LMVBVA">
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required>
      <label for="password">Mot de passe</label>
      <input type="password" id="password" required>
      <button type="submit">SE CONNECTER</button>
    </form>
    <div id="error"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
