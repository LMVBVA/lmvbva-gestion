<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LMVBVA - Entraîneurs</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      padding: 40px 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .topbar img { max-width: 60px; border-radius: 4px; }
    .back-link { color: #f5c400; text-decoration: none; font-size: 14px; }
    h1 {
      text-align: center;
      color: #f5c400;
      letter-spacing: 2px;
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .new-coach {
      max-width: 700px;
      margin: 0 auto 20px auto;
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .new-coach div { flex: 1; min-width: 130px; }
    .new-coach label { font-size: 13px; color: #bbbbbb; display: block; margin-bottom: 4px; }
    .new-coach input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ffffff;
      border-radius: 4px;
    }
    .new-coach button {
      background: #f5c400;
      color: #111;
      font-weight: bold;
      border: none;
      padding: 11px 18px;
      border-radius: 4px;
      cursor: pointer;
    }
    #message { max-width: 700px; margin: 0 auto; text-align: center; }
    #error { color: #ff6666; }
    #success { color: #7ed957; }
    .coach-list { max-width: 700px; margin: 20px auto 0 auto; }
.coach-row {
  background: rgba(28, 28, 28, 0.92);
  border: 1px solid #444;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.coach-actions button {
  background: transparent;
  border: 1px solid #f5c400;
  color: #f5c400;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  margin-left: 6px;
}
.coach-actions button:hover { background: #f5c400; color: #111; }
.coach-actions button.danger { border-color: #c62828; color: #c62828; }
.coach-actions button.danger:hover { background: #c62828; color: #fff; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="logo.jpg" alt="LMVBVA">
    <a href="teams.html" class="back-link">&larr; RETOUR AUX ÉQUIPES</a>
  </div>
  <h1>CRÉER UN ENTRAÎNEUR</h1>

  <div class="new-coach">
    <div>
      <label for="firstName">Prénom</label>
      <input type="text" id="firstName">
    </div>
    <div>
      <label for="lastName">Nom</label>
      <input type="text" id="lastName">
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email">
    </div>
    <div>
      <label for="password">Mot de passe</label>
      <input type="password" id="password">
    </div>
    <button id="createBtn">CRÉER</button>
  </div>

  <div id="message">
    <div id="error"></div>
    <div id="success"></div>
  </div>

  <div class="coach-list" id="coachList"></div>
  <script src="manage-coaches.js"></script>
</body>
</html>
