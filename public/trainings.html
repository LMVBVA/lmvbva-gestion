<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LMVBVA - Entraînements</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      padding: 40px 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .topbar img { max-width: 60px; border-radius: 4px; }
    .back-link {
      color: #f5c400;
      text-decoration: none;
      font-size: 14px;
    }
    h1 {
      text-align: center;
      color: #f5c400;
      letter-spacing: 2px;
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .new-training {
      max-width: 700px;
      margin: 0 auto 20px auto;
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .new-training label { font-size: 13px; color: #bbbbbb; display: block; margin-bottom: 4px; }
    .new-training input {
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ffffff;
      border-radius: 4px;
    }
    .new-training button {
      background: #f5c400;
      color: #111;
      font-weight: bold;
      border: none;
      padding: 11px 18px;
      border-radius: 4px;
      cursor: pointer;
    }
    .training-list { max-width: 700px; margin: 0 auto; }
    .training-card {
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .training-card:hover { border-color: #f5c400; }
    #error { color: #ff6666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="logo.jpg" alt="LMVBVA">
    <a href="teams.html" class="back-link">&larr; RETOUR AUX ÉQUIPES</a>
  </div>
  <h1 id="teamTitle">ENTRAÎNEMENTS</h1>

  <div class="new-training">
    <div>
      <label for="newDate">Nouvel entraînement (date)</label>
      <input type="date" id="newDate">
    </div>
    <button id="createBtn">CRÉER</button>
  </div>

  <div class="training-list" id="trainingList"></div>
  <div id="error"></div>

  <script src="trainings.js"></script>
</body>
</html>
