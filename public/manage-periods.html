<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMVBVA - Périodes sans entraînement</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('header2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      padding: 40px 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .topbar img { max-width: 60px; border-radius: 4px; }
    .back-link { color: #f5c400; text-decoration: none; font-size: 14px; }
    h1 {
      text-align: center;
      color: #f5c400;
      letter-spacing: 2px;
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 20px auto;
    }
    .new-period {
      max-width: 700px;
      margin: 0 auto 20px auto;
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .new-period div { flex: 1; min-width: 130px; }
    .new-period label { font-size: 13px; color: #bbbbbb; display: block; margin-bottom: 4px; }
    .new-period input, .new-period select {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ffffff;
      border-radius: 4px;
    }
    .new-period button {
      background: #f5c400;
      color: #111;
      font-weight: bold;
      border: none;
      padding: 11px 18px;
      border-radius: 4px;
      cursor: pointer;
    }
    .period-list { max-width: 700px; margin: 0 auto; }
    .period-row {
      background: rgba(28, 28, 28, 0.92);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .period-row button {
      background: transparent;
      border: 1px solid #c62828;
      color: #c62828;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .period-row button:hover { background: #c62828; color: #fff; }
    #error { color: #ff6666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="logo.jpg" alt="LMVBVA">
    <a href="teams.html" class="back-link">&larr; RETOUR AUX ÉQUIPES</a>
  </div>
  <h1>PÉRIODES SANS ENTRAÎNEMENT</h1>

  <div class="new-period">
    <div>
      <label for="label">Libellé</label>
      <input type="text" id="label" placeholder="Ex: Vacances de Noël">
    </div>
    <div>
      <label for="startDate">Début</label>
      <input type="date" id="startDate">
    </div>
    <div>
      <label for="endDate">Fin</label>
      <input type="date" id="endDate">
    </div>
    <div>
      <label for="youthOnly">Concerne</label>
      <select id="youthOnly">
        <option value="false">Toutes les équipes</option>
        <option value="true">Jeunes uniquement</option>
      </select>
    </div>
    <button id="addBtn">AJOUTER</button>
  </div>

  <div class="period-list" id="periodList"></div>
  <div id="error"></div>

  <script src="manage-periods.js"></script>
</body>
</html>
